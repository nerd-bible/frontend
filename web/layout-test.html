let paragraphs = paragraphsText.split(/\n+/);
for (let i = 0; i < 5; i++) paragraphs = paragraphs.concat(paragraphs);
const segmenter = new Intl.Segmenter("en", { granularity: "word" } );
const paragraphsWords = paragraphs.map(p => [...segmenter.segment(p)].map(w => w.segment));
const container = document.querySelector("main");
const timer = document.getElementById("timer");

console.log(paragraphsWords.length, "paragraphs");
console.log(paragraphsWords.reduce((acc, cur) => acc + cur.length, 0), "words");

let start;
function startTimer() {
	container.innerHTML = "";
	start = performance.now();
}

function endTimer(label) {
	console.log(label, "createElement", Math.round(performance.now() - start))
	requestAnimationFrame(() => {
		console.log(label, "total", Math.round(performance.now() - start));
	});
}

function normal() {
	startTimer();
	for (const pText of paragraphs) {
		const p = document.createElement("p");
		p.textContent = pText;
		container.append(p);
	}
	endTimer("normal");
}
function spans() {
	startTimer();
	for (const words of paragraphsWords) {
		const p = document.createElement("p");
		const toAppend = [];
		for (const word of words) {
			toAppend.push(document.createElement("button"));
			toAppend[toAppend.length - 1].textContent = word;
		}
		p.append(...toAppend);
		container.append(p);
	}
	endTimer("spans");
}
function fragments() {
	startTimer();
	for (const words of paragraphsWords) {
		const p = document.createElement("p");
		for (const word of words) {
			const fragment = document.createDocumentFragment();
			fragment.textContent = word;
			p.append(fragment);
		}
		container.append(p);
	}
	endTimer("fragments");
}
